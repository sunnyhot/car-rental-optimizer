name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: macos-14
    permissions:
      contents: write
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - name: Build .app bundle
        run: |
          swift package resolve
          bash scripts/build-app.sh

      - name: Create ZIP archive
        run: python3 scripts/create-zip.py "build/租车总成本比较.app" "租车总成本比较-${{ github.ref_name }}.zip"

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "租车总成本比较-${{ github.ref_name }}.zip" > "checksums-${{ github.ref_name }}.txt"
          cat "checksums-${{ github.ref_name }}.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "租车总成本比较 ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            租车总成本比较-${{ github.ref_name }}.zip
            checksums-${{ github.ref_name }}.txt
