name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: macos-14
    permissions:
      contents: write
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Print environment info
        run: |
          echo "== Swift version =="
          swift --version
          echo "== Xcode path =="
          xcode-select -p
          echo "== xcodebuild version =="
          xcodebuild -version
          echo "== Available Xcodes =="
          ls /Applications/ | grep Xcode

      - name: Resolve dependencies
        run: swift package resolve 2>&1 || true

      - name: Build .app bundle
        run: bash scripts/build-app.sh 2>&1 | tee /tmp/build.log || { cat /tmp/build.log; exit 1; }

      - name: Verify build output
        run: |
          echo "== Listing build directory =="
          ls -la build/
          echo "== App bundle exists =="
          test -d "build/租车总成本比较.app" && echo "YES" || echo "NO"
          echo "== App bundle size =="
          du -sh "build/租车总成本比较.app" 2>&1 || echo "N/A"

      - name: Verify signature
        run: |
          codesign --verify --deep "build/租车总成本比较.app" 2>&1 || echo "Warning: codesign verify failed, but ad-hoc signing is sufficient for distribution"

      - name: Create ZIP archive
        run: |
          set -x
          python3 scripts/create-zip.py build/租车总成本比较.app "租车总成本比较-${{ github.ref_name }}.zip"

      - name: Verify ZIP archive
        run: |
          echo "== ZIP file exists =="
          test -f "租车总成本比较-${{ github.ref_name }}.zip" && echo "YES" || echo "NO"
          echo "== ZIP file size =="
          ls -lh "租车总成本比较-${{ github.ref_name }}.zip"
          echo "== ZIP contents =="
          unzip -l "租车总成本比较-${{ github.ref_name }}.zip" | head -20

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "租车总成本比较-${{ github.ref_name }}.zip" > "checksums-${{ github.ref_name }}.txt"
          cat "checksums-${{ github.ref_name }}.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "租车总成本比较 ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            租车总成本比较-${{ github.ref_name }}.zip
            checksums-${{ github.ref_name }}.txt
