name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: macos-14
    permissions:
      contents: write
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || true

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Print environment info
        run: |
          echo "== Swift version =="
          swift --version
          echo "== Xcode path =="
          xcode-select -p
          echo "== xcodebuild version =="
          xcodebuild -version
          echo "== Available Xcodes =="
          ls /Applications/ | grep Xcode

      - name: Resolve dependencies
        run: swift package resolve 2>&1 || true

      - name: Build and verify .app bundle
        run: bash scripts/build-app.sh

      - name: Create ZIP archive
        run: python3 scripts/create-zip.py "build/租车比价助手.app" "CarRentalOptimizer-${{ github.ref_name }}.zip"

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "CarRentalOptimizer-${{ github.ref_name }}.zip" > "checksums-${{ github.ref_name }}.txt"
          cat "checksums-${{ github.ref_name }}.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "租车比价助手 ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            CarRentalOptimizer-${{ github.ref_name }}.zip
            checksums-${{ github.ref_name }}.txt
