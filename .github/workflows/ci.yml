name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Print environment info
        run: |
          echo "== Swift version =="
          swift --version
          echo "== Xcode path =="
          xcode-select -p
          echo "== xcodebuild version =="
          xcodebuild -version
          echo "== Available Xcodes =="
          ls /Applications/ | grep Xcode

      - name: Resolve dependencies
        run: |
          set -o pipefail
          swift package resolve 2>&1 | tee /tmp/resolve.log || { cat /tmp/resolve.log; exit 1; }

      - name: Build
        run: |
          set -o pipefail
          swift build -v 2>&1 | tee /tmp/build.log || { cat /tmp/build.log; exit 1; }

      - name: Run tests
        run: swift test

      - name: Build Release .app
        run: bash scripts/build-app.sh
